<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>ReName</title>
  <style>
    :root {
      --bg: #16171a; --panel: #1d1f24; --text: #e8eaef; --muted: #9aa0ab;
      --faint: #6b7079; --accent: #3b82f6; --border: #33363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-user-select: none; user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    .about { text-align: center; padding: 30px 34px 24px; max-width: 430px; }
    .icon { width: 92px; height: 92px; margin: 0 auto 16px; display: block; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.45)); }
    .name { font-size: 26px; font-weight: 700; letter-spacing: 0.3px; }
    .ver { font-size: 12.5px; color: var(--faint); margin-top: 4px; font-variant-numeric: tabular-nums; }
    .desc { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin: 16px auto 0; max-width: 340px; }
    .by { font-size: 13px; color: var(--text); margin-top: 18px; font-weight: 550; }
    .meta { font-size: 11.5px; color: var(--faint); margin-top: 7px; line-height: 1.7; }
    .repo {
      display: inline-block; margin-top: 18px; font-size: 13px; font-weight: 550;
      color: #cfe0ff; text-decoration: none;
      border: 1px solid var(--border); border-radius: 9px; padding: 8px 16px;
      transition: background 0.12s, border-color 0.12s;
    }
    .repo:hover { background: var(--panel); border-color: #41454e; }
    .close {
      display: block; margin: 16px auto 0; font-size: 12.5px; color: var(--muted);
      background: transparent; border: none; cursor: pointer; padding: 4px 10px;
    }
    .close:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="about">
    <svg class="icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="150" y1="120" x2="880" y2="930" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#4F8DF7"/><stop offset="0.55" stop-color="#3B6FE6"/><stop offset="1" stop-color="#5B57E0"/>
        </linearGradient>
        <linearGradient id="accent" x1="430" y1="400" x2="610" y2="610" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#6366F1"/>
        </linearGradient>
        <linearGradient id="sheen" x1="512" y1="96" x2="512" y2="620" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
        <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#16225e" flood-opacity="0.34"/>
        </filter>
      </defs>
      <rect x="84" y="84" width="856" height="856" rx="220" fill="url(#bg)"/>
      <rect x="84" y="84" width="856" height="856" rx="220" fill="url(#sheen)"/>
      <g filter="url(#cardShadow)">
        <g transform="rotate(-17 512 742)"><rect x="372" y="320" width="280" height="360" rx="40" fill="#FFFFFF" opacity="0.80"/></g>
        <g transform="rotate(17 512 742)"><rect x="372" y="320" width="280" height="360" rx="40" fill="#FFFFFF" opacity="0.80"/></g>
        <rect x="356" y="300" width="312" height="392" rx="46" fill="#FFFFFF"/>
      </g>
      <path d="M474 410 L474 582 L612 496 Z" fill="url(#accent)" stroke="url(#accent)" stroke-width="30" stroke-linejoin="round"/>
      <circle cx="452" cy="636" r="11" fill="url(#accent)" opacity="0.55"/>
      <circle cx="512" cy="636" r="15" fill="url(#accent)" opacity="0.78"/>
      <circle cx="578" cy="636" r="19" fill="url(#accent)"/>
    </svg>

    <div class="name">ReName</div>
    <div class="ver" id="ver"></div>
    <div class="desc" data-i18n="aboutDesc"></div>
    <div class="by" data-i18n="aboutBy"></div>
    <div class="meta">© 2026 Pekdemir Labs<br><span data-i18n="aboutLicenseLine"></span></div>
    <a class="repo" id="repo" href="https://github.com/yakuppekdemir-dev/ReName" target="_blank" rel="noopener" data-i18n="aboutRepo"></a>
    <button class="close" id="close" data-i18n="aboutClose"></button>
  </div>

  <script src="i18n.js"></script>
  <script src="about.js"></script>
</body>
</html>
