name: Build & Release

# Bir surum etiketi (orn. v1.0.1) push'landiginda macOS + Windows paketlerini
# uretip o etiketin GitHub Release'ine ekler. Elle de tetiklenebilir.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

      # Imzali derleme (Developer ID sertifikasi GitHub secret'larindan gelir)
      - name: Build (signed)
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: npm run dist:mac

      # Notarize + staple (App Store Connect API anahtari secret'lardan)
      - name: Notarize & staple
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "$APPLE_API_KEY_B64" ]; then
            echo "Notarization secret'lari yok — imzali ama notarize edilmemis derleme."
            exit 0
          fi
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          for d in release/*.dmg; do
            echo "Notarizing $d ..."
            xcrun notarytool submit "$d" --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
            xcrun stapler staple "$d"
          done
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "ReName $TAG" --notes "Automated build."
          gh release upload "$TAG" release/*.dmg --clobber

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run dist:win

      - name: Upload to Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "ReName $TAG" --notes "Automated build."
          gh release upload "$TAG" release/*.exe --clobber
